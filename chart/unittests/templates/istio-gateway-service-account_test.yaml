# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: Template - Istio Gateway ServiceAccount default
templates:
  - templates/istio-gateway/values.yaml
tests:
  - it: should inject the ServiceAccount default for the built-in public gateway
    postRenderer:
      cmd: "sh"
      args:
        - "-c"
        - 'yq eval ''select(.metadata.name == "RELEASE-NAME-istio-public-gateway-values") | .stringData.defaults'' - | yq eval ''.'''
    set:
      istiod.enabled: true
      istioGateway.enabled: true
    asserts:
      - equal:
          path: upstream.serviceAccount.create
          value: true
      - equal:
          path: upstream.serviceAccount.name
          value: public-ingressgateway-ingressgateway-service-account

  - it: should inject the ServiceAccount default for the built-in passthrough gateway
    postRenderer:
      cmd: "sh"
      args:
        - "-c"
        - 'yq eval ''select(.metadata.name == "RELEASE-NAME-istio-passthrough-gateway-values") | .stringData.defaults'' - | yq eval ''.'''
    set:
      istiod.enabled: true
      istioGateway.enabled: true
    asserts:
      - equal:
          path: upstream.serviceAccount.create
          value: true
      - equal:
          path: upstream.serviceAccount.name
          value: passthrough-ingressgateway-ingressgateway-service-account

  - it: should inject the same ServiceAccount-name pattern for a user-defined gateway
    postRenderer:
      cmd: "sh"
      args:
        - "-c"
        - 'yq eval ''select(.metadata.name == "RELEASE-NAME-istio-internal-gateway-values") | .stringData.defaults'' - | yq eval ''.'''
    set:
      istiod.enabled: true
      istioGateway.enabled: true
      istioGateway:
        values:
          gateways:
            internal:
              upstream:
                labels:
                  istio: ingressgateway
              gateway:
                servers:
                  - hosts:
                      - "*.internal.example.com"
                    port:
                      name: https
                      number: 8443
                      protocol: HTTPS
                    tls:
                      credentialName: internal-cert
                      mode: SIMPLE
    asserts:
      - equal:
          path: upstream.serviceAccount.create
          value: true
      - equal:
          path: upstream.serviceAccount.name
          value: internal-ingressgateway-ingressgateway-service-account

  - it: should let a user explicitly override the ServiceAccount name via overlays
    postRenderer:
      cmd: "sh"
      args:
        - "-c"
        - 'yq eval ''select(.metadata.name == "RELEASE-NAME-istio-internal-gateway-values") | .stringData.overlays'' - | yq eval ''.'''
    set:
      istiod.enabled: true
      istioGateway.enabled: true
      istioGateway:
        values:
          gateways:
            internal:
              upstream:
                labels:
                  istio: ingressgateway
                serviceAccount:
                  create: true
                  name: my-custom-internal-sa
              gateway:
                servers:
                  - hosts:
                      - "*.internal.example.com"
                    port:
                      name: https
                      number: 8443
                      protocol: HTTPS
                    tls:
                      credentialName: internal-cert
                      mode: SIMPLE
    asserts:
      - equal:
          path: upstream.serviceAccount.name
          value: my-custom-internal-sa

  - it: should inject the Istio version annotation for the built-in public gateway
    postRenderer:
      cmd: "sh"
      args:
        - "-c"
        - 'yq eval ''select(.metadata.name == "RELEASE-NAME-istio-public-gateway-values") | .stringData.defaults'' - | yq eval ''{"istioVersion": .upstream.podAnnotations."bigbang.dev/istioVersion"}'' -'
    set:
      istiod.enabled: true
      istiod.git.tag: 9.9.9-bb.0
      istioGateway.enabled: true
    asserts:
      - equal:
          path: istioVersion
          value: 9.9.9

  - it: should inject the Istio version annotation for a user-defined gateway
    postRenderer:
      cmd: "sh"
      args:
        - "-c"
        - 'yq eval ''select(.metadata.name == "RELEASE-NAME-istio-internal-gateway-values") | .stringData.defaults'' - | yq eval ''{"istioVersion": .upstream.podAnnotations."bigbang.dev/istioVersion"}'' -'
    set:
      istiod.enabled: true
      istiod.git.tag: 9.9.9-bb.0
      istioGateway.enabled: true
      istioGateway:
        values:
          gateways:
            internal:
              upstream:
                labels:
                  istio: ingressgateway
              gateway:
                servers:
                  - hosts:
                      - "*.internal.example.com"
                    port:
                      name: https
                      number: 8443
                      protocol: HTTPS
                    tls:
                      credentialName: internal-cert
                      mode: SIMPLE
    asserts:
      - equal:
          path: istioVersion
          value: 9.9.9

  - it: should preserve user pod annotations while forcing the Istio version annotation
    postRenderer:
      cmd: "sh"
      args:
        - "-c"
        - 'yq eval ''select(.metadata.name == "RELEASE-NAME-istio-internal-gateway-values") | .stringData.overlays'' - | yq eval ''{"istioVersion": .upstream.podAnnotations."bigbang.dev/istioVersion", "customAnnotation": .upstream.podAnnotations."example.com/custom"}'' -'
    set:
      istiod.enabled: true
      istiod.git.tag: 9.9.9-bb.0
      istioGateway.enabled: true
      istioGateway:
        values:
          gateways:
            internal:
              upstream:
                labels:
                  istio: ingressgateway
                podAnnotations:
                  example.com/custom: keep-me
                  bigbang.dev/istioVersion: user-value
              gateway:
                servers:
                  - hosts:
                      - "*.internal.example.com"
                    port:
                      name: https
                      number: 8443
                      protocol: HTTPS
                    tls:
                      credentialName: internal-cert
                      mode: SIMPLE
    asserts:
      - equal:
          path: istioVersion
          value: 9.9.9
      - equal:
          path: customAnnotation
          value: keep-me
