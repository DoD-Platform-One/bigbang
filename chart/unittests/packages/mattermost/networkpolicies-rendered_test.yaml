# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: Package - Mattermost - NetworkPolicies - Rendered
# NOTE: sed strips NOTES.txt content that helm-unittest includes, which contains colons that break yq parsing
postRenderer:
  cmd: sh
  args:
    - -c
    - |
      set -o pipefail && \
      sed -n '/^apiVersion:/,$p' \
        | yq 'select(.metadata.name == "*mattermost*")' \
        | BASH_ENV="" $(git rev-parse --show-toplevel)/scripts/template-all.sh \
        | yq 'select(.kind == "NetworkPolicy")'
tests:
  - it: should create database-subnets egress NetworkPolicy when external database is configured
    set:
      addons.mattermost.enabled: true
      addons.mattermost.database.username: "mattermost"
      addons.mattermost.database.password: "password"
      addons.mattermost.database.host: "postgres.example.com"
      addons.mattermost.database.port: 5432
      addons.mattermost.database.database: "mattermost"
      networkPolicies.enabled: true
    documentSelector:
      path: metadata.name
      value: allow-egress-from-mattermost-to-database-subnets
    asserts:
      - equal:
          path: kind
          value: NetworkPolicy
      - equal:
          path: metadata.name
          value: allow-egress-from-mattermost-to-database-subnets
      - equal:
          path: spec.egress[0].to[0].ipBlock.cidr
          value: 192.168.0.0/16
      - equal:
          path: spec.egress[0].to[1].ipBlock.cidr
          value: 172.16.0.0/12
      - equal:
          path: spec.egress[0].to[2].ipBlock.cidr
          value: 10.0.0.0/8
      - equal:
          path: spec.egress[0].ports[0].port
          value: 5432
