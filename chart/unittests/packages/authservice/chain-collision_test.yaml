# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: Package - Authservice - Chain Collision
# A user-defined chain under addons.authservice.chains must win over the
# umbrella's prometheus/alertmanager/thanos auto-inject, and must suppress only
# the colliding name, leaving the other auto-injected chains intact.
templates:
- authservice/values.yaml
tests:
- it: should auto-inject prometheus, alertmanager, and thanos when the user defines no chains
  set:
    istiod:
      enabled: true
    monitoring:
      enabled: true
      sso:
        enabled: true
        prometheus:
          client_id: auto-prometheus
        alertmanager:
          client_id: auto-alertmanager
    addons:
      thanos:
        enabled: true
        sso:
          enabled: true
          client_id: auto-thanos
  asserts:
  - matchRegex:
      path: stringData.defaults
      pattern: "client_id: auto-prometheus"
  - matchRegex:
      path: stringData.defaults
      pattern: "client_id: auto-alertmanager"
  - matchRegex:
      path: stringData.defaults
      pattern: "client_id: auto-thanos"

- it: should let the user prometheus chain win while alertmanager and thanos still auto-inject
  set:
    istiod:
      enabled: true
    monitoring:
      enabled: true
      sso:
        enabled: true
        prometheus:
          client_id: auto-prometheus
        alertmanager:
          client_id: auto-alertmanager
    addons:
      authservice:
        chains:
          prometheus:
            client_id: user-prometheus
      thanos:
        enabled: true
        sso:
          enabled: true
          client_id: auto-thanos
  asserts:
  - matchRegex:
      path: stringData.defaults
      pattern: "client_id: user-prometheus"
  - notMatchRegex:
      path: stringData.defaults
      pattern: "client_id: auto-prometheus"
  - matchRegex:
      path: stringData.defaults
      pattern: "client_id: auto-alertmanager"
  - matchRegex:
      path: stringData.defaults
      pattern: "client_id: auto-thanos"

- it: should let the user alertmanager chain win while prometheus and thanos still auto-inject
  set:
    istiod:
      enabled: true
    monitoring:
      enabled: true
      sso:
        enabled: true
        prometheus:
          client_id: auto-prometheus
        alertmanager:
          client_id: auto-alertmanager
    addons:
      authservice:
        chains:
          alertmanager:
            client_id: user-alertmanager
      thanos:
        enabled: true
        sso:
          enabled: true
          client_id: auto-thanos
  asserts:
  - matchRegex:
      path: stringData.defaults
      pattern: "client_id: user-alertmanager"
  - notMatchRegex:
      path: stringData.defaults
      pattern: "client_id: auto-alertmanager"
  - matchRegex:
      path: stringData.defaults
      pattern: "client_id: auto-prometheus"
  - matchRegex:
      path: stringData.defaults
      pattern: "client_id: auto-thanos"

- it: should let the user thanos chain win while prometheus and alertmanager still auto-inject
  set:
    istiod:
      enabled: true
    monitoring:
      enabled: true
      sso:
        enabled: true
        prometheus:
          client_id: auto-prometheus
        alertmanager:
          client_id: auto-alertmanager
    addons:
      authservice:
        chains:
          thanos:
            client_id: user-thanos
      thanos:
        enabled: true
        sso:
          enabled: true
          client_id: auto-thanos
  asserts:
  - matchRegex:
      path: stringData.defaults
      pattern: "client_id: user-thanos"
  - notMatchRegex:
      path: stringData.defaults
      pattern: "client_id: auto-thanos"
  - matchRegex:
      path: stringData.defaults
      pattern: "client_id: auto-prometheus"
  - matchRegex:
      path: stringData.defaults
      pattern: "client_id: auto-alertmanager"
