# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: Packages - Package - HelmRelease DependsOn Tests
templates:
  - templates/package/helmrelease.yaml
release:
  name: test
set:
  gatekeeper:
    enabled: true
  kyvernoPolicies:
    enabled: false
  istiod:
    enabled: false
  packages:
    sample:
      enabled: true
      git:
        repo: https://example.com/sample.git
        path: chart
        tag: 1.0.0
tests:
  - it: should use chart as the default path for a Git Helm package
    set:
      packages:
        sample:
          enabled: false
        podinfo:
          enabled: true
          sourceType: git
          git:
            repo: https://example.com/podinfo.git
            tag: 1.0.0
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.chart.spec.chart
          value: chart

  - it: should keep package template releaseName tied to package name
    set:
      packages:
        sample:
          enabled: true
          releaseName: sample-custom
          git:
            repo: https://example.com/sample.git
            path: chart
            tag: 1.0.0
    asserts:
      - equal:
          path: spec.releaseName
          value: sample

  - it: should include default dependsOn by default
    asserts:
      - contains:
          path: spec.dependsOn
          content:
            name: gatekeeper
            namespace: bigbang

  - it: should select HelmRepository according to sourceType even when git is configured
    set:
      packages:
        sample:
          enabled: true
          sourceType: helmRepo
          git:
            repo: https://example.com/sample.git
            path: chart
            tag: 1.0.0
          helmRepo:
            repoName: registry1
            chartName: sample-oci
            tag: 2.0.0
    asserts:
      - equal:
          path: spec.chart.spec.sourceRef.kind
          value: HelmRepository
      - equal:
          path: spec.chart.spec.chart
          value: sample-oci
      - equal:
          path: spec.chart.spec.version
          value: 2.0.0

  - it: should skip default dependsOn when includeDefaultDependsOn is false
    set:
      packages:
        sample:
          enabled: true
          includeDefaultDependsOn: false
          git:
            repo: https://example.com/sample.git
            path: chart
            tag: 1.0.0
    asserts:
      - notExists:
          path: spec.dependsOn

  - it: should keep custom dependsOn when includeDefaultDependsOn is false
    set:
      packages:
        sample:
          enabled: true
          includeDefaultDependsOn: false
          dependsOn:
            - name: custom-dependency
              namespace: custom-namespace
          git:
            repo: https://example.com/sample.git
            path: chart
            tag: 1.0.0
    asserts:
      - contains:
          path: spec.dependsOn
          content:
            name: custom-dependency
            namespace: custom-namespace
      - notContains:
          path: spec.dependsOn
          content:
            name: gatekeeper
            namespace: bigbang
