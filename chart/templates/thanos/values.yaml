{{- $pkg := "thanos" }}

{{- /* Create secret */ -}}
{{- if (get .Values.addons $pkg).enabled }}
  {{- $package := deepCopy (get .Values.addons $pkg) -}}
  {{- if $package.values -}}
    {{- $cleanedValues := include "mergeLegacyIstioHardenedKeys" (dict "values" $package.values) | fromYaml -}}
    {{- $package = set $package "values" $cleanedValues -}}
  {{- end -}}
  {{- include "values-secret" (dict
    "root" $
    "package" $package
    "name" "thanos"
    "defaults" ((mergeOverwrite (include "bigbang.defaults.thanos" . | fromYaml) (include "bigbang.thanos.bb-common-migrations" . | fromYaml)) | toYaml)
  )}}
{{- end }}

{{- /* Default values for Thanos */ -}}
{{- define "bigbang.defaults.thanos" -}}
{{- $istioEnabled := eq (include "istioEnabled" .) "true" }}
{{- $authserviceEnabled := eq (include "authserviceEnabled" .) "true" }}
{{- $thanosUsesAuthservice := or .Values.addons.authservice.enabled (and .Values.addons.thanos.sso.enabled $authserviceEnabled) }}
{{- $istioHardened := or
  (dig "istio" "hardened" "enabled" false .Values.addons.thanos.values)
  (dig "hardened" "enabled" false .Values.istiod.values)
}}

{{- $s3Bucket := .Values.addons.thanos.objectStorage.bucket }}
{{- $s3Region := .Values.addons.thanos.objectStorage.region }}
{{- $s3Endpoint := .Values.addons.thanos.objectStorage.endpoint }}
{{- if and (empty $s3Endpoint) (not (empty $s3Bucket)) (not (empty $s3Region)) }}
  {{- $s3Endpoint = printf "%s.s3.%s.amazonaws.com" $s3Bucket $s3Region }}
{{- end }}

{{- $shouldEnableMinio := or (and (eq .Values.addons.thanos.strategy "scalable") (not (and .Values.addons.thanos.objectStorage.endpoint .Values.addons.thanos.objectStorage.region))) (dig "minio" "enabled" false .Values.addons.thanos.values) -}}
{{- $storeGatewayEnabled := dig "upstream" "storegateway" "enabled" false .Values.addons.thanos.values }}
{{- $storeGatewayEnabled = or $storeGatewayEnabled (not (empty .Values.addons.thanos.objectStorage.endpoint)) }}

image:
  {{- include "secretsPullSecretsWithName" . | nindent 2 }}
  pullPolicy: {{ .Values.imagePullPolicy }}
  
upgradeJob:
  image:
    {{- include "secretsPullSecretsSingle" . | nindent 4 }}

externalURL: https://thanos.{{ .Values.domain }}

domain: {{ .Values.domain }}

routes:
  outbound:
    s3:
      enabled: {{ and $istioHardened (not (empty $s3Endpoint)) }}
      hosts:
      - {{ $s3Endpoint }}
  inbound:
    query-frontend:
      enabled: {{ $istioEnabled }}
      gateways:
      - istio-gateway/public-ingressgateway
      hosts:
      - thanos.{{ .Values.domain }}
    minio:
      enabled: {{ and $istioEnabled $shouldEnableMinio }}
      gateways:
      - istio-gateway/public-ingressgateway
      hosts:
      - thanos-minio.{{ .Values.domain }}

istio:
  enabled: {{ $istioEnabled }}
  sidecar:
    enabled: {{ and $istioHardened (ne (include "ambientEnabled" .) "true") }}
  ambient:
    enabled: {{ include "ambientEnabled" . }}
  authorizationPolicies:
    enabled: {{ $istioHardened }}
    generateFromNetpol: true

minio:
  enabled: {{ $shouldEnableMinio }}
  {{- if $shouldEnableMinio }}
  upstream:
    tenant:
      {{- include "secretsImagePullSecretWithName" . | nindent 6 }}
      metrics:
        enabled: {{ .Values.monitoring.enabled }}
  {{- end }}

networkPolicies:
  enabled: {{ .Values.networkPolicies.enabled }}
  hbonePortInjection:
    enabled: {{ include "ambientEnabled" . }}
  egress:
    definitions: {{ .Values.networkPolicies.egress.definitions | toYaml | nindent 6 }}
    from:
      '*':
        to:
          definition:
            kubeAPI: true
      thanos-query:
        podSelector:
          matchLabels:
            app.kubernetes.io/name: thanos
            app.kubernetes.io/component: query
        to:
          k8s:
            monitoring/prometheus:10901: {{ .Values.monitoring.enabled }}
            authservice/authservice:10003: {{ $thanosUsesAuthservice }}
      thanos-storegateway:
        podSelector:
          matchLabels:
            app.kubernetes.io/name: thanos
            app.kubernetes.io/component: storegateway
        to:
          definition:
            storage-subnets: {{ $storeGatewayEnabled }}
  ingress:
    definitions: {{ .Values.networkPolicies.ingress.definitions | toYaml | nindent 6 }}
    to:
      minio:9000:
        from:
          k8s:
            minio-operator@minio-operator/minio-operator: {{ $shouldEnableMinio }}
            alloy-alloy-metrics@alloy/alloy-metrics: {{ dig "alloyMetrics" "enabled" false .Values.alloy }}
            monitoring-monitoring-kube-prometheus@monitoring/prometheus: {{ .Values.monitoring.enabled }}
      thanos-query-frontend:9090:
        podSelector:
          matchLabels:
            app.kubernetes.io/name: thanos
            app.kubernetes.io/component: query-frontend
        from:
          definition:
            gateway: {{ .Values.istioGateway.enabled }}
          k8s:
            authservice/authservice:10003: {{ and .Values.addons.thanos.sso.enabled (not .Values.addons.authservice.enabled) }}
            authservice-waypoint@authservice/authservice-waypoint: {{ and (eq (include "ambientEnabled" .) "true") $thanosUsesAuthservice .Values.addons.thanos.sso.enabled }}
            monitoring-monitoring-kube-prometheus@monitoring/prometheus: {{ .Values.monitoring.enabled }}
      thanos-query:10902:
        podSelector:
          matchLabels:
            app.kubernetes.io/name: thanos
            app.kubernetes.io/component: query
        from:
          k8s:
            monitoring-grafana@monitoring/grafana: {{ .Values.grafana.enabled }}
            authservice/authservice:10003: {{ and .Values.addons.thanos.sso.enabled (not .Values.addons.authservice.enabled) }}
            monitoring-monitoring-kube-prometheus@monitoring/prometheus: {{ .Values.monitoring.enabled }}
      thanos-storegateway:10902:
        podSelector:
          matchLabels:
            app.kubernetes.io/name: thanos
            app.kubernetes.io/component: storegateway
        from:
          k8s:
            monitoring-monitoring-kube-prometheus@monitoring/prometheus: {{ .Values.monitoring.enabled }}
      thanos-compactor:10902:
        podSelector:
          matchLabels:
            app.kubernetes.io/name: thanos
            app.kubernetes.io/component: compactor
        from:
          k8s:
            monitoring-monitoring-kube-prometheus@monitoring/prometheus: {{ .Values.monitoring.enabled }}
      thanos-bucketweb:8080:
        podSelector:
          matchLabels:
            app.kubernetes.io/name: thanos
            app.kubernetes.io/component: bucketweb
        from:
          k8s:
            monitoring-monitoring-kube-prometheus@monitoring/prometheus: {{ .Values.monitoring.enabled }}
      thanos-ruler:10902:
        podSelector:
          matchLabels:
            app.kubernetes.io/name: thanos
            app.kubernetes.io/component: ruler
        from:
          k8s:
            monitoring-monitoring-kube-prometheus@monitoring/prometheus: {{ .Values.monitoring.enabled }}
      thanos-receive:10902:
        podSelector:
          matchLabels:
            app.kubernetes.io/name: thanos
            app.kubernetes.io/component: receive
        from:
          k8s:
            monitoring-monitoring-kube-prometheus@monitoring/prometheus: {{ .Values.monitoring.enabled }}

monitoring:
  enabled: {{ .Values.monitoring.enabled }}

upstream:
  {{- if .Values.monitoring.enabled }}
  metrics:
    enabled: true
    image:
      {{- include "secretsPullSecrets" . | nindent 4 }}
    serviceMonitor:
      enabled: true
  {{- end }}

  query:
    dnsDiscovery:
      # to allow lookups to work with and without Istio enabled, we disable k8s dns service
      # discovery and manually set stores: below.
      #
      # With Istio, the combination of headless service + TCP port will create an entry
      # for each pod IP:PORT and that makes communication via IP:PORT viable
      enabled: false
    {{- if or .Values.monitoring.enabled $storeGatewayEnabled }}
    stores:
    {{- end }}
      {{- if .Values.monitoring.enabled }}
      - dns+monitoring-monitoring-kube-thanos-discovery.monitoring.svc.cluster.local:10901
      {{- end }}
      {{- if $storeGatewayEnabled }}
      - dns+thanos-storegateway.thanos.svc.cluster.local:10901
      {{- end }}
    networkPolicy:
      enabled: false

  queryFrontend:
    {{- if or .Values.addons.thanos.sso.enabled .Values.kiali.enabled }}
    podLabels:
      {{- if .Values.addons.thanos.sso.enabled }}
      {{- $thanosAuthserviceKey := (dig "selector" "key" "protect" .Values.addons.authservice.values) }}
      {{- $thanosAuthserviceValue := (dig "selector" "value" "keycloak" .Values.addons.authservice.values) }}
      {{ $thanosAuthserviceKey }}: {{ $thanosAuthserviceValue }}
      {{- end }}
    {{- end }}
    {{- if and (eq (include "ambientEnabled" .) "true") $thanosUsesAuthservice .Values.addons.thanos.sso.enabled }}
      # In ambient mode, route query-frontend traffic through the authservice waypoint so SSO is enforced.
    service:
      labels:
        istio.io/use-waypoint: authservice-waypoint
        istio.io/use-waypoint-namespace: authservice
        istio.io/ingress-use-waypoint: "true"
    {{- end }}

    networkPolicy:
      enabled: false

  bucketweb:
    networkPolicy:
      enabled: false

  ruler:
    networkPolicy:
      enabled: false

  receive:
    networkPolicy:
      enabled: false

  {{- if or (dig "values" "upstream" "compactor" "enabled" false .Values.addons.thanos) .Values.addons.thanos.objectStorage.endpoint }}
  compactor:
    enabled: true
    networkPolicy:
      enabled: false
  {{- end }}

  {{- if .Values.addons.thanos.objectStorage.endpoint }}
  objstoreConfig: |-
    type: s3
    config:
      bucket: {{ .Values.addons.thanos.objectStorage.bucket }}
      endpoint: {{ .Values.addons.thanos.objectStorage.endpoint }}
      access_key: {{ .Values.addons.thanos.objectStorage.accessKey }}
      secret_key: {{ .Values.addons.thanos.objectStorage.accessSecret }}
      insecure: {{ .Values.addons.thanos.objectStorage.insecure }}
  {{- end }}

  storegateway:
    enabled: {{ $storeGatewayEnabled }}
    useEndpointGroup: true
    networkPolicy:
      enabled: false
{{- end }}
