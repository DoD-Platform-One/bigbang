{{- if .Values.addons.argocd.enabled }}
# handle legacy istio hardened keys in argocd values
{{- $argocdPackage := deepCopy .Values.addons.argocd -}}
{{- $cleanedValues := include "mergeLegacyIstioHardenedKeys" (dict "values" .Values.addons.argocd.values) | fromYaml -}}
{{- $argocdPackage = set $argocdPackage "values" $cleanedValues -}}

{{- include "values-secret" (dict
  "root" $
  "package" $argocdPackage
  "name" "argocd"
  "defaults" ((mergeOverwrite (include "bigbang.defaults.argocd" . | fromYaml) (include "bigbang.argocd.bb-common-migrations" . | fromYaml)) | toYaml)
)}}
{{- end }}

{{- define "bigbang.defaults.argocd" -}}
{{- $istioEnabled := eq (include "istioEnabled" .) "true" }}
{{- $istioHardened := or
  (dig "istio" "hardened" "enabled" false .Values.addons.argocd.values)
  (dig "hardened" "enabled" false .Values.istiod.values)
}}
{{- $istioInjection := and $istioEnabled (ne (include "ambientEnabled" .) "true") (eq (dig "istio" "injection" "enabled" .Values.addons.argocd) "enabled") }}
# hostname is deprecated and replaced with domain. But if hostname exists then use it.
{{- $domainName := default .Values.domain .Values.hostname }}
hostname: {{ $domainName }}
domain: {{ $domainName }}

redis-bb:
  networkPolicy:
    enabled: {{ .Values.networkPolicies.enabled }}
  {{- if and .Values.addons.argocd.redis.host .Values.addons.argocd.redis.port }}
  enabled: false
  {{- else }}
  enabled: true
  {{- end }}

  upstream:
    image:
      pullPolicy: {{ .Values.imagePullPolicy }}
      # This clears out our forces value in the package.  We should use the global values set below
      # This can be removed when we remove the overrides at the package level 
      pullSecrets: []
    auth:
      enabled: false
    metrics:
    {{- if eq (include "metricScrapingEnabled" .) "true" }}
      enabled: true
      serviceMonitor:
        enabled: true
        namespace: argocd
        selector:
          app.kubernetes.io/name: redis-bb
          app.kubernetes.io/instance: argocd-argocd
        # conditional passes only for default istio: enabled, mTLS: SCRICT, istio injection: enabled
        {{- if and $istioInjection (eq (dig "istio" "mtls" "mode" "STRICT" .Values.addons.argocd.values) "STRICT") }}
        scheme: https
        tlsConfig:
          caFile: /etc/prom-certs/root-cert.pem
          certFile: /etc/prom-certs/cert-chain.pem
          keyFile: /etc/prom-certs/key.pem
          insecureSkipVerify: true
        {{- end }}
  
      prometheusRule:
        enabled: true
        namespace: monitoring
    {{- else }}
      enabled: false
    {{- end }}
  {{- if $istioInjection }}
    master:
      podAnnotations:
        {{ include "istioAnnotation" . }}
    replica:
      podAnnotations:
        {{ include "istioAnnotation" . }}
  {{- end }}

createNamespace: false

global:
  {{- $argocdHosts := (dig "istio" "argocd" "hosts" dict .Values.addons.argocd.values) }}
  {{- if $argocdHosts }}
  domain: {{ tpl ($argocdHosts | first) $ }}
  {{- else }}
  domain: argocd.{{ $domainName }}
  {{- end }}
  image:
    imagePullPolicy: {{ .Values.imagePullPolicy }}
  {{- include "secretsImagePullSecretsWithName" . | nindent 2 }}
{{- if $istioInjection }}
  podAnnotations:
    {{ include "istioAnnotation" . }}
{{- end }}
{{- if .Values.kiali.enabled }}
  podLabels:
    service.istio.io/canonical-name: argocd-argocd
{{- end }}

istio:
  enabled: {{ $istioEnabled }}
  sidecar:
    enabled: {{ and $istioHardened (ne (include "ambientEnabled" .) "true") }}
  ambient:
    enabled: {{ include "ambientEnabled" . }}
  injection: {{ ternary "disabled" (dig "istio" "injection" "enabled" .Values.addons.argocd) (eq (include "ambientEnabled" .) "true") }}
  authorizationPolicies:
    enabled: {{ $istioHardened }}
    generateFromNetpol: {{ $istioHardened }}

monitoring:
  enabled: {{ eq (include "metricScrapingEnabled" .) "true" }}

routes:
  inbound:
    argocd:
      enabled: true
      gateways:
      - {{ include "getGatewayName" (dict "gateway" .Values.addons.argocd.ingress.gateway "root" .)}}
      hosts:
      - argocd.{{ $domainName }}
      service: argocd-argocd-server
      containerPort: 8080
      port: 80
      selector:
        app.kubernetes.io/name: argocd-server
  outbound:
    bb-tests:
      enabled: {{ dig "bbtests" "enabled" false .Values.addons.argocd.values }}
      hosts:
      - 'repo1.dso.mil'

networkPolicies:
  # -- Toggle BigBang networkPolicies integration
  enabled: {{ .Values.networkPolicies.enabled }}
  hbonePortInjection:
    enabled: {{ include "ambientEnabled" . }}
  ingress:
    to:
      # -- Ingress to argocd-server for metrics from prometheus
      argocd-server:8083:
        from:
          k8s:
            monitoring-monitoring-kube-prometheus@monitoring/prometheus: {{ .Values.monitoring.enabled }}
      # -- Ingress to argocd-repo-server for metrics from prometheus
      argocd-repo-server:8084:
        from:
          k8s:
            monitoring-monitoring-kube-prometheus@monitoring/prometheus: {{ .Values.monitoring.enabled }}
      # -- Ingress to argocd-application-controller for metrics from prometheus
      argocd-application-controller:8082:
        from:
          k8s:
            monitoring-monitoring-kube-prometheus@monitoring/prometheus: {{ .Values.monitoring.enabled }}
      # -- Ingress to redis from grafana for dashboards
      redis-bb:6379:
        from:
          k8s:
            monitoring/grafana: {{ and .Values.addons.argocd.redis.host .Values.addons.argocd.redis.port .Values.grafana.enabled }}
      # -- Ingress to redis-exporter for metrics from prometheus
      redis-bb:9121:
        from:
          k8s:
            monitoring-monitoring-kube-prometheus@monitoring/prometheus: {{ and .Values.addons.argocd.redis.host .Values.addons.argocd.redis.port .Values.monitoring.enabled }}
  egress:
    from:
      # -- Egress to tempo for tracing from all pods
      "*":
        to:
          k8s:
            tempo/tempo:9411: {{ and .Values.tempo.enabled (ne (include "ambientEnabled" .) "true") }}

bbtests:
  enableImagePullSecrets: {{ ne .Values.registryCredentials nil }}
  cypress:
    envs:
      cypress_url: {{ printf "https://argocd.%s" $domainName | quote }}
  scripts:
    envs:
      ARGOCD_SERVER: {{ printf "https://argocd.%s" $domainName | quote }}

upstream:
  {{- if .Values.addons.argocd.redis.host }}
  externalRedis: 
    host: {{ default "argocd-argocd-redis-bb-headless.argocd.svc.cluster.local" .Values.addons.argocd.redis.host }}
    port: {{ default 6379 .Values.addons.argocd.redis.port }}
  {{- end }}
  {{- if .Values.addons.argocd.sso.enabled }}
  configs:
    cm:
      oidc.config: |
        name: {{ default .Values.sso.name .Values.addons.argocd.sso.provider_name }}
        issuer: {{ include "sso.url" . }}
        clientID: {{ .Values.addons.argocd.sso.client_id }}
        clientSecret: {{ .Values.addons.argocd.sso.client_secret }}
        requestedScopes: ["openid","ArgoCD"]
        {{- if (or .Values.sso.certificate_authority (dig "certificateAuthority" "cert" false .Values.sso)) }}
        rootCA: |
          {{- default (dig "certificateAuthority" "cert" "" .Values.sso) .Values.sso.certificate_authority | nindent 10 }}
        {{- end }}
    {{- if .Values.addons.argocd.sso.groups }}
    rbac:
      policy.csv: |
        {{- .Values.addons.argocd.sso.groups | nindent 8 }}
    {{- end }}
    {{- if .Values.addons.argocd.sso.client_secret }}
    secret:
      extra:
        keycloakClientSecret: {{ .Values.addons.argocd.sso.client_secret }}
    {{- end }} 
  {{- end }}
  openshift:
    enabled: {{ .Values.openshift }}

  controller:
    image:
      imagePullPolicy: {{ .Values.imagePullPolicy }}
    # conditional passes only for default istio: enabled, mTLS: SCRICT, istio injection: enabled
    {{- if and $istioInjection (eq (dig "istio" "mtls" "mode" "STRICT" .Values.addons.argocd.values) "STRICT") }}
    metrics:
      serviceMonitor:
        scheme: https
        tlsConfig:
          caFile: /etc/prom-certs/root-cert.pem
          certFile: /etc/prom-certs/cert-chain.pem
          keyFile: /etc/prom-certs/key.pem
          insecureSkipVerify: true
    {{- end }}
  
  dex:
    image:
      imagePullPolicy: {{ .Values.imagePullPolicy }}
  
  server:
    image:
      imagePullPolicy: {{ .Values.imagePullPolicy }}
    autoscaling:
      enabled: true
    config:
      # Must be enabled for plugins included in PlatformOne image.
      kustomize.buildOptions: "--enable-alpha-plugins"
    # conditional passes only for default istio: enabled, mTLS: SCRICT, istio injection: enabled
    {{- if and $istioInjection (eq (dig "istio" "mtls" "mode" "STRICT" .Values.addons.argocd.values) "STRICT") }}
    metrics:
      serviceMonitor:
        scheme: https
        tlsConfig:
          caFile: /etc/prom-certs/root-cert.pem
          certFile: /etc/prom-certs/cert-chain.pem
          keyFile: /etc/prom-certs/key.pem
          insecureSkipVerify: true
    {{- end }}
  
  repoServer:
    image:
      imagePullPolicy: {{ .Values.imagePullPolicy }}
    autoscaling:
      enabled: true
    # conditional that will attach the argocd-iam-secret environment variables containing AWS credentials from argocd values for SOPS on the repo-server deployment.
    {{- $awskeyid := dig "addons" "argocd" "values" "awsCredentials" "awsAccessKeyId" false (.Values | merge (dict)) }}
    {{- $awssecret := dig "addons" "argocd" "values" "awsCredentials" "awsSecretAccessKey" false (.Values | merge (dict)) }}
    {{- if and $awskeyid $awssecret }}
    envFrom:
    - secretRef:
        name: argocd-iam-secret
    {{- end }}     
    # conditional passes only for default istio: enabled, mTLS: SCRICT, istio injection: enabled
    {{- if and $istioInjection (eq (dig "istio" "mtls" "mode" "STRICT" .Values.addons.argocd.values) "STRICT") }}
    metrics:
      serviceMonitor:
        scheme: https
        tlsConfig:
          caFile: /etc/prom-certs/root-cert.pem
          certFile: /etc/prom-certs/cert-chain.pem
          keyFile: /etc/prom-certs/key.pem
          insecureSkipVerify: true
    {{- end }}

{{- end -}}

