{{- /* Create secret */ -}}
{{- if .Values.addons.mimir.enabled }}
{{- /* Create a cleaned copy of mimir config and merge deprecated paths into current paths */ -}}
{{- $mimirPackage := deepCopy .Values.addons.mimir -}}
{{- if .Values.addons.mimir.values -}}
{{- $cleanedValues := include "mergeLegacyIstioHardenedKeys" (dict "values" .Values.addons.mimir.values) | fromYaml -}}
{{- $mimirPackage = set $mimirPackage "values" $cleanedValues -}}
{{- end -}}
{{- include "values-secret" (dict 
  "root" $ 
  "package" $mimirPackage 
  "name" "mimir" 
  "defaults" ((mergeOverwrite (include "bigbang.defaults.mimir" . | fromYaml) (include "bigbang.mimir.bb-common-migrations" . | fromYaml)) | toYaml)
)}}
{{- end }}

{{- define "bigbang.defaults.mimir" -}}
{{- $istioEnabled := eq (include "istioEnabled" .) "true" }}
{{- $istioHardenedEnabled := or (dig "istio" "hardened" "enabled" false .Values.addons.mimir.values) (dig "hardened" "enabled" false .Values.istiod.values) }}

{{- $minioEnabled := (.Values.addons.mimir.minioObjectStorage.enabled) }}
{{- $s3Enabled := (.Values.addons.mimir.s3ObjectStorage.enabled) }}
{{- $mimirEnterpriseEnabled := (.Values.addons.mimir.enterprise.enabled) }}
{{- $istioInjection := (and $istioEnabled (eq (dig "istio" "injection" "enabled" .Values.addons.mimir) "enabled"))  }}

upgradeJob:
  image:
    {{- include "secretsPullSecretsSingle" . | nindent 4 }}
  
monitoring:
  enabled: {{ .Values.monitoring.enabled }}

istio:
  enabled: {{ $istioEnabled }}
  hardened:
    enabled: {{ $istioHardenedEnabled }}

  sidecar:
    enabled: {{ and $istioHardenedEnabled (ne (include "ambientEnabled" .) "true") }}

  ambient:
    enabled: {{ include "ambientEnabled" . }}

  authorizationPolicies:
    enabled: {{ $istioHardenedEnabled }}
    generateFromNetpol: true

routes:
  inbound:
    mimir-gateway:
      enabled: false
      gateways:
        - {{ include "getGatewayName" (dict "gateway" "public" "root" .)}}
      hosts:
        - mimir.{{ .Values.domain }}
      service: mimir-mimir-gateway.mimir.svc.cluster.local
      port: 8080
      selector:
        app.kubernetes.io/component: gateway
        app.kubernetes.io/name: mimir
  outbound:
    bb-tests:
      enabled: {{ dig "bbtests" "enabled" false .Values.addons.vault.values }}
      hosts:
      - repo1.dso.mil

networkPolicies:
  enabled: {{ .Values.networkPolicies.enabled }}
  hbonePortInjection:
    enabled: {{ include "ambientEnabled" . }}
  egress:
    definitions: {{ .Values.networkPolicies.egress.definitions | toYaml | nindent 6 }}
    from:
      mimir:
        to:
          k8s:
            monitoring/grafana:3000: {{ .Values.grafana.enabled }}
          definition:
            storage-subnets: {{ not $minioEnabled }}
      rollout-operator:
        to:
          k8s:
            monitoring/grafana:3000: {{ .Values.grafana.enabled }} 
      minio:
        to:
          definition:
            kubeAPI: {{ $minioEnabled }}

  ingress:
    definitions: {{ .Values.networkPolicies.ingress.definitions | toYaml | nindent 6 }}
    to:
      mimir:[15020]:
        from:
          k8s:
            monitoring-monitoring-kube-prometheus@monitoring/prometheus: {{ .Values.monitoring.enabled }}  
            alloy-alloy-metrics@alloy/alloy-metrics: {{ .Values.alloy.alloyMetrics.enabled }}
      mimir:[8080,9095]:
        from:
          k8s:
            monitoring-monitoring-kube-prometheus@monitoring/prometheus: {{ .Values.monitoring.enabled }}
            monitoring-grafana@monitoring/grafana: {{ .Values.grafana.enabled }}
            alloy-alloy-metrics@alloy/alloy-metrics: {{ .Values.alloy.alloyMetrics.enabled }}
      rollout-operator:[8080,9095]:
        from:
          k8s:
            monitoring-monitoring-kube-prometheus@monitoring/prometheus: {{ .Values.monitoring.enabled }}
            monitoring-grafana@monitoring/grafana: {{ .Values.grafana.enabled }}
            alloy-alloy-metrics@alloy/alloy-metrics: {{ .Values.alloy.alloyMetrics.enabled }}
      rollout-operator:[15020]:
        from:
          k8s:
            monitoring-monitoring-kube-prometheus@monitoring/prometheus: {{ .Values.monitoring.enabled }}
            alloy-alloy-metrics@alloy/alloy-metrics: {{ .Values.alloy.alloyMetrics.enabled }}
      minio:[9000]:
        from:
          k8s: 
            minio-operator@minio-operator/minio-operator: {{ and $minioEnabled .Values.addons.minioOperator.enabled }}
            monitoring-monitoring-kube-prometheus@monitoring/prometheus: {{ and $minioEnabled .Values.monitoring.enabled }}
      minio:[15020]:
        from:
          k8s:
            minio-operator@monitoring/prometheus: {{ and $minioEnabled .Values.monitoring.enabled }}
            alloy-alloy-metrics@alloy/alloy-metrics: {{ and $minioEnabled (dig "alloyMetrics" "enabled" false .Values.alloy) }}

bbtests:
  enableImagePullSecrets: {{ ne .Values.registryCredentials nil }}
  cypress:
    envs:
      cypress_grafana_url: {{ printf "https://grafana.%s" .Values.domain | quote }}
  scripts:
    envs:
      MIMIR_URL: 'http://mimir-mimir-distributor.mimir.svc:8080'

{{- if $minioEnabled }}
minio-tenant:
  enabled: true
  upstream:
    tenant:
      name: mimir-mimir-minio-tenant
      {{- include "secretsImagePullSecretWithName" . | nindent 6 }}
      configSecret:
        accessKey: {{ .Values.addons.mimir.minioObjectStorage.configSecret.accessKey }}
        secretKey: {{ .Values.addons.mimir.minioObjectStorage.configSecret.secretKey }}
      defaultUserCredentials:
          username: {{ .Values.addons.mimir.minioObjectStorage.defaultUserCredentials.username }}
          password: {{ .Values.addons.mimir.minioObjectStorage.defaultUserCredentials.password }}
{{- end }}

upstream:
  image:
    {{- include "secretsPullSecrets" . | nindent 4 }}
    
  rollout_operator:
    {{- include "secretsImagePullSecretsWithName" . | nindent 4 }}

  query_scheduler:
    enabled: {{ not $istioEnabled }}
  {{- if or $minioEnabled $s3Enabled }}
  {{- if and $s3Enabled .Values.addons.mimir.s3ObjectStorage.accessSecret .Values.addons.mimir.s3ObjectStorage.accessKey }}
  global:
    extraEnvFrom:
    - secretRef:
        name: mimir-objstore-secret
  {{- end }}
  {{- if .Values.addons.mimir.serviceAccountAnnotations }}
  serviceAccount:
    annotations:
      {{- range $key, $value :=  .Values.addons.mimir.serviceAccountAnnotations }}
      {{ $key }}: {{ $value | quote }}
      {{- end }}
  {{- end }}
  mimir:
    structuredConfig:
    {{- if $mimirEnterpriseEnabled }}
      admin_client:
      backend: s3
    {{- end }}
      alertmanager_storage:
        backend: s3
      blocks_storage:
        backend: s3
      ruler_storage:
        backend: s3
      common:
        storage:
          backend: s3
          s3:
            {{- if $minioEnabled }}
            access_key_id: {{ .Values.addons.mimir.minioObjectStorage.configSecret.accessKey }}
            endpoint: minio.mimir.svc.cluster.local
            insecure: true
            secret_access_key: {{ .Values.addons.mimir.minioObjectStorage.configSecret.secretKey }}
            bucket_name: mimir
            {{- else }}
            {{- if $s3Enabled }}
            {{- if and .Values.addons.mimir.s3ObjectStorage.accessSecret .Values.addons.mimir.s3ObjectStorage.accessKey }}
            access_key_id: "${AWS_ACCESS_KEY_ID}" # This is a secret injected via an environment variable
            secret_access_key: "${AWS_SECRET_ACCESS_KEY}" # This is a secret injected via an environment variable
            {{- end }}
            endpoint: {{ .Values.addons.mimir.s3ObjectStorage.endpoint }}
            insecure: {{ .Values.addons.mimir.s3ObjectStorage.insecure }}
            region: {{ .Values.addons.mimir.s3ObjectStorage.region }}
            bucket_name: {{ .Values.addons.mimir.s3ObjectStorage.bucketName }}
          {{- end }}
          {{- end }}
    {{- end }}
  metaMonitoring:
    serviceMonitor:
      enabled: {{ eq (include "metricScrapingEnabled" .) "true" }}
      {{- if and (eq (include "metricScrapingEnabled" .) "true") $istioEnabled (eq (dig "istio" "mtls" "mode" "STRICT" .Values.addons.mimir.values) "STRICT") }}
      scheme: https
      tlsConfig:
        caFile: /etc/prom-certs/root-cert.pem
        certFile: /etc/prom-certs/cert-chain.pem
        keyFile: /etc/prom-certs/key.pem
        insecureSkipVerify: true  # Prometheus does not support Istio security naming, thus skip verifying target pod certificate
      {{- end }}
    dashboards:
      enabled: {{ .Values.grafana.enabled }}
{{- end }}
