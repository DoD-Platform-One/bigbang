{{- if .Values.addons.fortify.enabled }}
{{- $fortifyPackage := deepCopy .Values.addons.fortify -}}
{{- if .Values.addons.fortify.values -}}
{{- $cleanedValues := include "mergeLegacyIstioHardenedKeys" (dict "values" .Values.addons.fortify.values) | fromYaml -}}
{{- $fortifyPackage = set $fortifyPackage "values" $cleanedValues -}}
{{- end -}}
{{- include "values-secret" (dict
  "root" $
  "package" $fortifyPackage
  "name" "fortify"
  "defaults" ((mergeOverwrite (include "bigbang.defaults.fortify" . | fromYaml) (include "bigbang.fortify.bb-common-migrations" . | fromYaml)) | toYaml)
)}}
{{- end }}

{{- define "bigbang.defaults.fortify" -}}
{{- $istioEnabled := eq (include "istioEnabled" .) "true" }}
{{- $istioHardened := or (dig "istio" "hardened" "enabled" false .Values.addons.fortify.values) (dig "hardened" "enabled" false .Values.istiod.values) }}
{{- $externalMySQLHost := dig "externalDatabase" "host" "" .Values.addons.fortify }}
{{- $externalMySQLPort := dig "externalDatabase" "port" 3306 .Values.addons.fortify }}
{{- $externalMySQLCIDRs := dig "networkPolicies" "egress" "definitions" "external-mysql" "to" list .Values.addons.fortify.values }}
{{- $externalMySQLEnabled := and (not (dig "mysql" "enabled" true .Values.addons.fortify.values)) (not (empty $externalMySQLCIDRs)) }}
{{- $externalMySQLRouteEnabled := and $istioEnabled (not (dig "mysql" "enabled" true .Values.addons.fortify.values)) (ne $externalMySQLHost "") }}

upstream:
  {{- include "secretsImagePullSecretsWithName" . | nindent 2 }}
  
mysql:
  global:
    {{- include "secretsImagePullSecretsWithName" . | nindent 4 }}

domain: {{ .Values.domain }}

openshift: {{ .Values.openshift }}

istio:
  enabled: {{ $istioEnabled }}
  hardened:
    enabled: {{ $istioHardened }}
  sidecar:
    enabled: {{ $istioHardened }}
  authorizationPolicies:
    enabled: {{ $istioHardened }}

routes:
  inbound:
    fortify:
      enabled: true
      gateways:
        - {{ include "getGatewayName" (dict "gateway" .Values.addons.fortify.ingress.gateway "root" .) }}
      hosts:
        - fortify.{{ .Values.domain }}
      service: fortify-ssc-service
      port: 80
      selector:
        app.kubernetes.io/name: fortify-ssc
        app.kubernetes.io/component: webapp
  outbound:
    bb-tests:
      enabled: {{ dig "bbtests" "enabled" false .Values.addons.fortify.values }}
      hosts:
        - repo1.dso.mil
    external-mysql:
      enabled: {{ $externalMySQLRouteEnabled }}
      {{- if ne $externalMySQLHost "" }}
      hosts:
        - {{ $externalMySQLHost | quote }}
      {{- end }}
      ports:
        - number: {{ $externalMySQLPort }}
          name: mysql
          protocol: TCP

networkPolicies:
  enabled: {{ .Values.networkPolicies.enabled }}
  egress:
    from:
      fortify-webapp:
        podSelector:
          matchLabels:
            app.kubernetes.io/name: fortify-ssc
            app.kubernetes.io/component: webapp
        to:
          definition:
            external-mysql: {{ $externalMySQLEnabled }}

{{- end }}
