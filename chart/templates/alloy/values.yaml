{{- /* Create secret */ -}}
{{- if .Values.alloy.enabled }}
{{- /* Create a cleaned copy of alloy config and merge deprecated paths into current paths */ -}}
{{- $alloyPackage := deepCopy .Values.alloy -}}
{{- if .Values.alloy.values -}}
{{- $cleanedValues := include "mergeLegacyIstioHardenedKeys" (dict "values" .Values.alloy.values) | fromYaml -}}
{{- $alloyPackage = set $alloyPackage "values" $cleanedValues -}}
{{- end -}}
{{- include "values-secret" (dict 
  "root" $ 
  "package" $alloyPackage 
  "name" "alloy" 
  "defaults" ((mergeOverwrite (include "bigbang.defaults.alloy" . | fromYaml) (include "bigbang.alloy.bb-common-migrations" . | fromYaml)) | toYaml)
)}}
{{- end }}

{{- define "bigbang.defaults.alloy" -}}
{{- $alloyLogsEnabled := (dig "alloyLogs" "enabled" false .Values.alloy) }}
{{- $alloyMetricsEnabled := (dig "alloyMetrics" "enabled" false .Values.alloy) }}
{{- $alloyClusterEventsEnabled := (dig "alloyClusterEvents" "enabled" false .Values.alloy) }}
{{- $tempoEnabled := .Values.tempo.enabled }}
{{- $mimirEnabled := .Values.addons.mimir.enabled }}
{{- $istioEnabled := eq (include "istioEnabled" .) "true" }}
{{- $ambientEnabled := eq (include "ambientEnabled" .) "true" }}
{{- $istioHardenedEnabled := or (dig "istio" "hardened" "enabled" false .Values.alloy.values) (dig "hardened" "enabled" false .Values.istiod.values) }}
{{/* When ambient mode is enabled, sidecar injection is disabled since sidecars are not used */}}
{{- $sidecarInjectionEnabled := and $istioEnabled (not $ambientEnabled) }}

{{- $lokiServiceMap := dict
    "monolith" "logging-loki"
    "scalable" "logging-loki-write"
    "distributed" "logging-loki-distributor"
}}
{{- $lokiServiceName := index $lokiServiceMap .Values.loki.strategy }}
{{- $lokiWriteDestUrl := printf "http://%s.logging.svc.cluster.local:3100/loki/api/v1/push" $lokiServiceName }}


global:
  {{- include "secretsImagePullSecretsWithName" . | nindent 2 }}
  image:
    {{- include "secretsPullSecretsWithName" . | nindent 4 }}

monitoring:
  enabled: {{ .Values.monitoring.enabled }}

networkPolicies:
  enabled: {{ .Values.networkPolicies.enabled }}
  hbonePortInjection:
    enabled: {{ include "ambientEnabled" . }}
  ingress:
    definitions: {{ .Values.networkPolicies.ingress.definitions | toYaml | nindent 6 }}
    to:
      # Allow alloy-metrics and Prometheus to scrape alloy-receiver
      alloy-receiver:12345:
        from:
          k8s:
            # Use full sa@namespace/pod format for same-namespace AuthorizationPolicy
            alloy-alloy-metrics@alloy/alloy-metrics: {{ dig "alloyMetrics" "enabled" false .Values.alloy }}
            monitoring-monitoring-kube-prometheus@monitoring/prometheus: {{ .Values.monitoring.enabled }}

      # Allow alloy-metrics and Prometheus to scrape alloy-logs
      alloy-logs:12345:
        from:
          k8s:
            # Use full sa@namespace/pod format for same-namespace AuthorizationPolicy
            alloy-alloy-metrics@alloy/alloy-metrics: {{ dig "alloyMetrics" "enabled" false .Values.alloy }}
            monitoring-monitoring-kube-prometheus@monitoring/prometheus: {{ .Values.monitoring.enabled }}

      # Allow alloy-metrics and Prometheus to scrape alloy-singleton
      alloy-singleton:12345:
        from:
          k8s:
            alloy-alloy-metrics@alloy/alloy-metrics: {{ dig "alloyMetrics" "enabled" false .Values.alloy }}
            monitoring-monitoring-kube-prometheus@monitoring/prometheus: {{ .Values.monitoring.enabled }}

      # Allow alloy-metrics and Prometheus to scrape alloy-metrics
      alloy-metrics:12345:
        from:
          k8s:
            alloy-alloy-metrics@alloy/alloy-metrics: {{ dig "alloyMetrics" "enabled" false .Values.alloy }}
            monitoring-monitoring-kube-prometheus@monitoring/prometheus: {{ .Values.monitoring.enabled }}
      {{- if $tempoEnabled }}
      # Allow any namespace to send traces to alloy-receiver via OTLP gRPC
      alloy-receiver:4317:
        from:
          k8s:
            "*/*": true
      # Allow any namespace to send traces to alloy-receiver via Zipkin
      alloy-receiver:9411:
        from:
          k8s:
            "*/*": true
      {{- end }}
  egress:
    definitions: {{ .Values.networkPolicies.egress.definitions | toYaml | nindent 6 }}
    from:
      alloy-logs:
        to:
          k8s:
            # Loki egress: namespace with app.kubernetes.io/name=logging, pod with app.kubernetes.io/name=logging-loki, port 3100
            logging/logging-loki:3100: {{ .Values.loki.enabled }}
      alloy:
        to:
          tempo/tempo:4317: {{ .Values.tempo.enabled }}
      {{- if $alloyClusterEventsEnabled }}
      alloy-singleton:
        to:
          k8s:
            logging/logging-loki:3100: {{ .Values.loki.enabled }}
      {{- end }}
      {{- if $tempoEnabled }}
      # Allow alloy-receiver to forward traces to Tempo backend
      alloy-receiver:
        to:
          k8s:
            tempo/tempo:4317: true
      {{- end }}
      {{- if $alloyMetricsEnabled }}
      # Allow alloy-metrics to push metrics to Prometheus and Mimir
      alloy-metrics:
        to:
          definition:
            kubeAPI: true
          k8s:
            monitoring/monitoring-monitoring-kube-prometheus:9090: {{ .Values.monitoring.enabled }}
            mimir/mimir-mimir-gateway:8080: {{ $mimirEnabled }}
      {{- end }}
istio:
  enabled: {{ $istioEnabled }}

  sidecar:
    enabled: {{ and $istioHardenedEnabled (ne (include "ambientEnabled" .) "true") }}

  ambient:
    enabled: {{ include "ambientEnabled" . }}

  authorizationPolicies:
    enabled: {{ $istioHardenedEnabled }}
    generateFromNetpol: {{ $istioHardenedEnabled }}

upstream:
  {{- if .Values.kiali.enabled }}
  alloy:
    extraLabels:
      service.istio.io/canonical-name: alloy-alloy-logs
  {{- end }}
  destinations:
    {{- if and (or $alloyLogsEnabled $alloyClusterEventsEnabled) .Values.loki.enabled }}
    - name: loki
      type: loki
      url: {{ $lokiWriteDestUrl }}
    {{- end }}
    {{- if $tempoEnabled }}
    - name: tempo
      type: otlp
      url: http://tempo-tempo.tempo.svc.cluster.local:4317
      metrics:
        enabled: false
      logs:
        enabled: false
      tls:
        insecure: true
    {{- end }}
    {{- if and $alloyMetricsEnabled .Values.monitoring.enabled }}
    - name: prometheus
      type: prometheus
      {{- if $sidecarInjectionEnabled }}
      url: https://monitoring-monitoring-kube-prometheus.monitoring.svc.cluster.local:9090/api/v1/write
      tls:
        caFile: /etc/prom-certs/root-cert.pem
        certFile: /etc/prom-certs/cert-chain.pem
        keyFile: /etc/prom-certs/key.pem
        insecureSkipVerify: true
      {{- else }}
      url: http://monitoring-monitoring-kube-prometheus.monitoring.svc.cluster.local:9090/api/v1/write
      {{- end }}
    {{- end }}
    {{- if and $alloyMetricsEnabled $mimirEnabled }}
    - name: mimir
      type: prometheus
      {{- if $sidecarInjectionEnabled }}
      url: https://mimir-mimir-gateway.mimir.svc.cluster.local:80/api/v1/push
      tls:
        caFile: /etc/prom-certs/root-cert.pem
        certFile: /etc/prom-certs/cert-chain.pem
        keyFile: /etc/prom-certs/key.pem
        insecureSkipVerify: true
      {{- else }}
      url: http://mimir-mimir-gateway.mimir.svc.cluster.local/api/v1/push
      {{- end }}
    {{- end }}
  {{- if .Values.alloy.additionalDestinations }}
  {{- toYaml .Values.alloy.additionalDestinations | nindent 4 }}
  {{- end }}
  {{- if $alloyLogsEnabled }}
  alloy-logs:
    enabled: true
  podLogs:
    enabled: true
    destinations:
      {{- if .Values.loki.enabled }}
      - loki
      {{- end }}
      {{- if .Values.alloy.additionalDestinations }}
      {{- range $dest := .Values.alloy.additionalDestinations }}
      {{- if eq (lower $dest.type) "loki" }}
      - {{ $dest.name }}
      {{- end }}
      {{- end }}
      {{- end }}
    collector: alloy-logs
    labelsToKeep:
      - app.kubernetes.io/name
      - container
      - instance
      - job
      - level
      - namespace
      - service.name
      - service.namespace
      - deployment.environment
      - deployment.environment.name
      - k8s.namespace.name
      - k8s.deployment.name
      - k8s.statefulset.name
      - k8s.daemonset.name
      - k8s.cronjob.name
      - k8s.job.name
      - k8s.node.name
      - k8s.pod.name
      - pod
    structuredMetadata:
      k8s.pod.name: null
      pod: null
  {{- end }}
  {{- if $alloyClusterEventsEnabled }}
  alloy-singleton:
    enabled: true
    {{- if and $alloyMetricsEnabled $sidecarInjectionEnabled }}
    alloy:
      # Mount Istio certs so alloy-singleton can use prometheus destination with mTLS
      mounts:
        extra:
          - name: istio-certs
            mountPath: /etc/prom-certs/
    controller:
      podAnnotations:
        proxy.istio.io/config: |
          proxyMetadata:
            OUTPUT_CERTS: /etc/istio-output-certs
        sidecar.istio.io/userVolumeMount: '[{"name": "istio-certs", "mountPath": "/etc/istio-output-certs"}]'
        traffic.sidecar.istio.io/includeOutboundIPRanges: ""
      volumes:
        extra:
          - name: istio-certs
            emptyDir:
              medium: Memory
    {{- end }}
  clusterEvents:
    enabled: true
    destinations:
      {{- if .Values.loki.enabled }}
      - loki
      {{- end }}
      {{- if .Values.alloy.additionalDestinations }}
      {{- range $dest := .Values.alloy.additionalDestinations }}
      {{- if eq (lower $dest.type) "loki" }}
      - {{ $dest.name }}
      {{- end }}
      {{- end }}
      {{- end }}
  {{- end }}
  {{- if $tempoEnabled }}
  # Enable alloy-receiver to collect traces and forward to Tempo
  alloy-receiver:
    enabled: true
    alloy:
      extraPorts:
      - name: otlp-grpc
        port: 4317
        targetPort: 4317
        protocol: TCP
        appProtocol: grpc
      - name: zipkin
        port: 9411
        targetPort: 9411
        protocol: TCP
  applicationObservability:
    enabled: true
    receivers:
      otlp:
        grpc:
          enabled: true
      zipkin:
        enabled: true
    metrics:
      enabled: false
    logs:
      enabled: false
    destinations:
      - tempo
  {{- end }}
  {{- if $alloyMetricsEnabled }}
  # Enable alloy-metrics to scrape ServiceMonitors/PodMonitors and forward via remote write
  alloy-metrics:
    enabled: true
    alloy:
      {{- if and $istioEnabled $istioHardenedEnabled }}
      extraAnnotations:
        {{ include "istioAnnotation" . }}
      {{- end }}
      {{- if $sidecarInjectionEnabled }}
      # Mount Istio certs so alloy-metrics can scrape ServiceMonitors with mTLS tlsConfig
      mounts:
        extra:
          - name: istio-certs
            mountPath: /etc/prom-certs/
      {{- end }}
    controller:
      {{- if $sidecarInjectionEnabled }}
      # Istio sidecar annotations to output certs to the shared istio-certs volume
      podAnnotations:
        proxy.istio.io/config: |
          proxyMetadata:
            OUTPUT_CERTS: /etc/istio-output-certs
        sidecar.istio.io/userVolumeMount: '[{"name": "istio-certs", "mountPath": "/etc/istio-output-certs"}]'
        traffic.sidecar.istio.io/includeOutboundIPRanges: ""
      volumes:
        extra:
          - name: istio-certs
            emptyDir:
              medium: Memory
      {{- end }}
  prometheusOperatorObjects:
    enabled: true
    destinations:
      {{- if .Values.monitoring.enabled }}
      - prometheus
      {{- end }}
      {{- if $mimirEnabled }}
      - mimir
      {{- end }}
    collector: alloy-metrics
  {{- end }}
  {{- if eq (include "metricScrapingEnabled" $) "true" }}
serviceMonitors:
  {{- if $alloyLogsEnabled }}
  - name: alloy-alloy-logs
    additionalLabels:
      app.kubernetes.io/instance: alloy
      app.kubernetes.io/name: alloy-logs
    selectorLabels:
      app.kubernetes.io/instance: alloy-alloy-logs
      app.kubernetes.io/name: alloy-logs
    {{- if and $sidecarInjectionEnabled (eq (dig "istio" "mtls" "mode" "STRICT" $.Values.alloy.values) "STRICT") }}
    scheme: https
    tlsConfig:
      caFile: /etc/prom-certs/root-cert.pem
      certFile: /etc/prom-certs/cert-chain.pem
      keyFile: /etc/prom-certs/key.pem
      insecureSkipVerify: true  # Prometheus does not support Istio security naming, thus skip verifying target pod certificate
    {{- end }}
  {{- if and $alloyClusterEventsEnabled $.Values.monitoring.enabled }}
  - name: alloy-alloy-singleton
    additionalLabels:
      app.kubernetes.io/instance: alloy
      app.kubernetes.io/name: alloy-singleton
    selectorLabels:
      app.kubernetes.io/instance: alloy-alloy-singleton
      app.kubernetes.io/name: alloy-singleton
    {{- if and $sidecarInjectionEnabled (eq (dig "istio" "mtls" "mode" "STRICT" $.Values.alloy.values) "STRICT") }}
    scheme: https
    tlsConfig:
      caFile: /etc/prom-certs/root-cert.pem
      certFile: /etc/prom-certs/cert-chain.pem
      keyFile: /etc/prom-certs/key.pem
      insecureSkipVerify: true
    {{- end }}
  {{- end }}
  {{- end }}
  {{- if $alloyMetricsEnabled }}
  - name: alloy-alloy-metrics
    additionalLabels:
      app.kubernetes.io/instance: alloy
      app.kubernetes.io/name: alloy-metrics
    selectorLabels:
      app.kubernetes.io/instance: alloy-alloy-metrics
      app.kubernetes.io/name: alloy-metrics
    {{- if and $sidecarInjectionEnabled (eq (dig "istio" "mtls" "mode" "STRICT" $.Values.alloy.values) "STRICT") }}
    scheme: https
    tlsConfig:
      caFile: /etc/prom-certs/root-cert.pem
      certFile: /etc/prom-certs/cert-chain.pem
      keyFile: /etc/prom-certs/key.pem
      insecureSkipVerify: true  # Prometheus does not support Istio security naming, thus skip verifying target pod certificate
    {{- end }}
  {{- end }}
  {{- end }}
{{- end }}
