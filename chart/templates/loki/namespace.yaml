{{- if and .Values.loki.enabled (not .Values.elasticsearchKibana.enabled) }}
{{- $istioEnabled := eq (include "istioEnabled" .) "true" }}
apiVersion: v1
kind: Namespace
metadata:
  name: logging
  labels:
    app.kubernetes.io/name: logging
    app.kubernetes.io/component: "core"
    {{- include "commonLabels" . | nindent 4}}
    {{- if eq (include "ambientEnabled" .) "true" }}
    istio.io/dataplane-mode: ambient
    {{- else }}
    istio-injection: {{ ternary "enabled" "disabled" (and $istioEnabled (eq (dig "istio" "injection" "enabled" .Values.loki) "enabled")) }}
    {{- end }}
{{- end }}
